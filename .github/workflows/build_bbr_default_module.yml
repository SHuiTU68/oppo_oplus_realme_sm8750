name: (独立) BBR 默认算法模块构建

env:
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release(关闭则仅上传 artifact 工件)'
        required: true
        type: boolean
        default: 'true'
  push:
    paths:
      - 'bbr_default_module/**'
      - '.github/workflows/build_bbr_default_module.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: ver
        run: |
          VER=$(grep '^version=' bbr_default_module/module.prop | cut -d= -f2)
          VCODE=$(grep '^versionCode=' bbr_default_module/module.prop | cut -d= -f2)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"

      - name: 打包 BBR 默认算法模块 ZIP
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OUT_NAME="bbr_default-${VERSION}.zip"
          OUT_PATH="$(pwd)/${OUT_NAME}"

          staging="$(mktemp -d)"
          cp -r bbr_default_module/* "$staging/"

          # 修正 module.prop 版本号
          sed -i "s/^version=.*/version=${VERSION}/" "$staging/module.prop"
          sed -i "s/^versionCode=.*/versionCode=${{ steps.ver.outputs.vcode }}/" "$staging/module.prop"

          # 设置权限
          chmod 755 "$staging"/*.sh 2>/dev/null || true
          chmod 755 "$staging/META-INF/com/google/android/update-binary" 2>/dev/null || true

          rm -f "$OUT_PATH"
          (cd "$staging" && zip -r9 "$OUT_PATH" .)
          rm -rf "$staging"

          echo "=== 打包结果 ==="
          ls -la "$OUT_PATH"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbr_default-module-zip
          path: bbr_default-*.zip
          retention-days: 30

      - name: 创建发布
        if: inputs.create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          TAG="bbr-default-$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          VERSION="${{ steps.ver.outputs.version }}"

          printf '%s\n' \
            "### BBRv3 默认算法模块" \
            "" \
            "- 构建时间: $TIME_FORM" \
            "- 模块版本: $VERSION" \
            "- 作用: 覆盖 OPPO vendor init 的 bic 硬编码, 强制 BBRv3" \
            "" \
            "#### 三重保险" \
            "1. post-fs-data.sh: 早期设置" \
            "2. service.sh: 开机后最终覆盖 (延迟 3s 等 vendor init 执行完)" \
            "3. system.prop: resetprop 方式" \
            "" \
            "#### 前置条件" \
            "- 内核已编译 BBRv3 (CONFIG_TCP_CONG_BBR3=y)" \
            "- 推荐: CONFIG_NET_SCH_FQ=y (FQ 队列)" \
            "- 推荐: CONFIG_TCP_ECN=y (ECN)" \
            "" \
            "#### 验证 BBRv3 是否生效" \
            "重启后执行:" \
            "  cat /proc/sys/net/ipv4/tcp_congestion_control" \
            "  (应显示 bbr3)" \
            "  cat /data/adb/bbr_default.log" \
            "  (查看应用日志)" \
            "" \
            "#### 验证 BBRv3 状态机" \
            "  ss -ti" \
            "  (显示 bbr3 + pacing_gain/cwnd_gain/bw/mrtt 等状态)" \
            "" > release_notes.md

          gh release create "$TAG" \
            --title "BBRv3 默认算法模块 $VERSION" \
            --notes-file release_notes.md \
            bbr_default-*.zip
