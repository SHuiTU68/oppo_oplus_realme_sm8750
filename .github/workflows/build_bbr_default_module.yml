name: (独立) BBR 默认算法模块构建

env:
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release(关闭则仅上传 artifact 工件)'
        required: true
        type: boolean
        default: 'true'
  push:
    paths:
      - 'bbr_default_module/**'
      - '.github/workflows/build_bbr_default_module.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: ver
        run: |
          VER=$(grep '^version=' bbr_default_module/module.prop | cut -d= -f2)
          VCODE=$(grep '^versionCode=' bbr_default_module/module.prop | cut -d= -f2)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"

      - name: 打包 BBR 默认算法模块 ZIP
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OUT_NAME="bbr_default-${VERSION}.zip"
          OUT_PATH="$(pwd)/${OUT_NAME}"

          staging="$(mktemp -d)"
          cp -r bbr_default_module/* "$staging/"

          # 修正 module.prop 版本号
          sed -i "s/^version=.*/version=${VERSION}/" "$staging/module.prop"
          sed -i "s/^versionCode=.*/versionCode=${{ steps.ver.outputs.vcode }}/" "$staging/module.prop"

          # 设置权限
          chmod 755 "$staging"/*.sh 2>/dev/null || true

          # META-INF (recovery 安装支持)
          mkdir -p "$staging/META-INF/com/google/android"
          cat > "$staging/META-INF/com/google/android/update-binary" << 'UPDATER'
#!/sbin/sh

OUTFD=/proc/self/fd/$2
ZIPFILE="$3"

ui_print() { echo -e "ui_print $1\nui_print" >> $OUTFD; }

MODPATH="${MODPATH:-/data/adb/modules/bbr_default}"
mkdir -p "$MODPATH"
unzip -o "$ZIPFILE" -d "$MODPATH" >&2
chmod 755 "$MODPATH"/*.sh 2>/dev/null || true
ui_print "BBR default module installed via recovery"
exit 0
UPDATER
          echo "" > "$staging/META-INF/com/google/android/updater-script"

          rm -f "$OUT_PATH"
          (cd "$staging" && zip -r9 "$OUT_PATH" .)
          rm -rf "$staging"

          echo "=== 打包结果 ==="
          ls -la "$OUT_PATH"
          echo "out_path=$OUT_PATH" >> "$GITHUB_OUTPUT"
          echo "out_name=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bbr_default-module-zip
          path: bbr_default-*.zip
          retention-days: 30

      - name: 创建发布
        if: inputs.create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          TAG="bbr-default-$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          VERSION="${{ steps.ver.outputs.version }}"

          cat << EOF > release_notes.md
          ### 📦 BBR 默认算法模块

          - 构建时间: $TIME_FORM
          - 模块版本: $VERSION
          - 作用: 覆盖 OPPO vendor init 的 bic 硬编码, 强制 BBR

          #### 三重保险
          1. **post-fs-data.sh**: 早期设置 (部分场景生效)
          2. **service.sh**: 开机后最终覆盖 (最可靠, 延迟 3s 等 vendor init 执行完)
          3. **system.prop**: resetprop 方式

          #### 前置条件
          - 内核已编译 BBRv3 (CONFIG_TCP_CONG_BBR=y)
          - 推荐: CONFIG_NET_SCH_FQ=y (FQ 队列)
          - 推荐: CONFIG_TCP_ECN=y (ECN)

          #### 验证
          重启后执行:
          \`\`\`sh
          cat /proc/sys/net/ipv4/tcp_congestion_control
          # 应显示 bbr
          cat /data/adb/bbr_default.log
          # 查看应用日志
          \`\`\`
          EOF

          gh release create "$TAG" \
            --title "BBR 默认算法模块 $VERSION" \
            --notes-file release_notes.md \
            bbr_default-*.zip
