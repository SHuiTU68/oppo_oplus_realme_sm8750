name: (独立) ZeroMount KSU 模块构建

env:
  TZ: Asia/Shanghai
  CARGO_TERM_COLOR: always
  NDK_VERSION: r27c
  NDK_HOME: /opt/ndk
  ZM_REPO: Enginex0/zeromount
  TARGET: aarch64-linux-android
  ABI: arm64-v8a

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 Release(关闭则仅上传 artifact 工件)'
        required: true
        type: boolean
        default: 'true'
      zm_ref:
        description: 'ZeroMount 上游分支/tag/commit (默认 master)'
        required: false
        type: string
        default: 'master'
      fix_bootloop:
        description: '应用 bootloop 修复(调高阈值+禁用强制重启,推荐开启)'
        required: false
        type: boolean
        default: 'true'
      profile:
        description: '编译 profile (release 推荐 / debug 含调试符号 / both 两者都打包)'
        required: false
        type: choice
        default: 'release'
        options:
          - release
          - debug
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取 ZeroMount 上游源码
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ZM_REPO }}
          ref: ${{ inputs.zm_ref }}
          submodules: recursive

      - name: 应用 bootloop 修复
        if: inputs.fix_bootloop
        run: |
          echo "=== 应用 bootloop 修复 ==="
          # 1. 调高 bootloop 阈值 (1 → 999, 实质禁用 bootloop 判定)
          sed -i 's/const BOOTLOOP_THRESHOLD: u32 = 1;/const BOOTLOOP_THRESHOLD: u32 = 999;/' src/core/config.rs
          echo "[1/3] BOOTLOOP_THRESHOLD: 1 → 999"
          # 2. recovery 不再强制重启 (只 disable, 避免 bootloop 死循环)
          sed -i '\|Command::new("/system/bin/svc")|d' src/guard/recovery.rs
          echo "[2/3] recovery: 移除 svc power reboot (不再强制重启)"
          # 3. clear_lockout 同时清 bootcount (重新启用后不会残留旧计数)
          sed -i 's|let _ = fs::remove_file(RECOVERY_LOCKOUT);|let _ = fs::remove_file(RECOVERY_LOCKOUT);\n    let _ = fs::remove_file("/data/adb/zeromount/.bootcount");|' src/guard/recovery.rs
          echo "[3/3] clear_lockout: 同时清除 .bootcount"
          echo ""
          echo "=== 修改验证 ==="
          grep -n "BOOTLOOP_THRESHOLD" src/core/config.rs
          grep -n "svc\|reboot\|remove_file" src/guard/recovery.rs

      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends zip
          curl -sSfL "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" -o ndk.zip
          unzip -q ndk.zip -d /opt
          mv /opt/android-ndk-${NDK_VERSION} ${NDK_HOME}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: zm-cargo-${{ env.TARGET }}-${{ inputs.profile }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: zm-cargo-${{ env.TARGET }}-

      - name: 编译 zeromount (release)
        if: inputs.profile != 'debug'
        run: |
          export PATH="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cargo build --release --target "$TARGET"
        env:
          TARGET: ${{ env.TARGET }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang

      - name: 编译 zeromount (debug)
        if: inputs.profile == 'debug' || inputs.profile == 'both'
        run: |
          export PATH="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cargo build --target "$TARGET"
        env:
          TARGET: ${{ env.TARGET }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 构建 WebUI (SolidJS + Vite)
        run: cd webui && pnpm install && pnpm run build

      - name: 构建 axon (C, arm64 only)
        run: |
          export PATH="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          AXON=external/axon
          if [ ! -f "$AXON/inject.c" ]; then
            echo "axon 源码未找到, 跳过"
            exit 0
          fi
          abi="${ABI}"
          prefix="${TARGET}"
          cc="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${prefix}23-clang"
          ar="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          out="target/axon/$abi"
          mkdir -p "$out" "module/bin/$abi" "module/lib/$abi"
          CFLAGS="-fvisibility=hidden -Os -DANDROID"
          "$cc" $CFLAGS -c "$AXON/external/plthook/plthook_elf.c" \
            -I"$AXON/external/plthook" -o "$out/plthook_elf.o"
          "$ar" rcs "$out/libplthook.a" "$out/plthook_elf.o"
          "$cc" $CFLAGS -s "$AXON/inject.c" "$AXON/ptrace.c" "$AXON/utils.c" \
            -o "$out/axon_inject"
          "$cc" $CFLAGS -shared -s "$AXON/axon_init.c" "$AXON/utils.c" \
            -I"$AXON/external/plthook" -L"$out" -lplthook \
            -o "$out/libaxon_init.so"
          "$cc" $CFLAGS -shared -s "$AXON/axon_adbd.c" "$AXON/utils.c" \
            -ldl -o "$out/libaxon_adbd.so"
          cp "$out/axon_inject" "module/bin/$abi/"
          cp "$out/libaxon_init.so" "module/lib/$abi/"
          cp "$out/libaxon_adbd.so" "module/lib/$abi/"

      - name: 读取版本号
        id: ver
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${ver}" >> "$GITHUB_OUTPUT"
          echo "vcode=${ver%%-*}" >> "$GITHUB_OUTPUT"
          echo "vcode=${ver}" >> "$GITHUB_OUTPUT"

      - name: 打包 ZeroMount 模块 ZIP (arm64 only)
        id: pkg
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          VCODE="${{ steps.ver.outputs.vcode }}"
          VCODE_NUM="${VCODE#v}"
          VCODE_NUM="${VCODE_NUM%%-*}"
          VCODE_NUM="${VCODE_NUM//./}"

          # 脚本列表 (来自 package.sh)
          SCRIPTS=(action.sh boot-completed.sh common.sh install_func.sh install_i18n.sh \
                   post-fs-data.sh metamount.sh service.sh uninstall.sh metainstall.sh \
                   metauninstall.sh customize.sh prop_table.sh)

          build_zip() {
            local profile="$1"
            local target_subdir="$1"
            local suffix=""
            [ "$profile" = "debug" ] && suffix="-debug"
            local out_name="zeromount-${VERSION}${suffix}.zip"
            local out_path="$(pwd)/release/$profile/$out_name"
            mkdir -p "release/$profile"
            local staging
            staging="$(mktemp -d)"

            echo "==> 打包 $profile: $out_name"

            # 脚本
            for s in "${SCRIPTS[@]}"; do
              [ -f "module/$s" ] && cp "module/$s" "$staging/$s"
            done
            # module.prop (改写版本号)
            cp module/module.prop "$staging/module.prop"
            sed -i "s/^version=.*/version=${VERSION}/" "$staging/module.prop"
            sed -i "s/^versionCode=.*/versionCode=${VCODE_NUM}/" "$staging/module.prop"
            # sepolicy.rule
            [ -f module/sepolicy.rule ] && cp module/sepolicy.rule "$staging/sepolicy.rule"

            # zeromount 二进制
            mkdir -p "$staging/bin/${ABI}"
            cp "target/${TARGET}/${target_subdir}/zeromount" "$staging/bin/${ABI}/zeromount"
            chmod 755 "$staging/bin/${ABI}/zeromount"
            # axon 二进制 (如有)
            [ -f "module/bin/${ABI}/axon_inject" ] && cp "module/bin/${ABI}/axon_inject" "$staging/bin/${ABI}/"
            if [ -d "module/lib/${ABI}" ]; then
              mkdir -p "$staging/lib/${ABI}"
              cp module/lib/${ABI}/*.so "$staging/lib/${ABI}/" 2>/dev/null || true
            fi
            # resetprop-rs (如有预编译)
            [ -f "module/bin/${ABI}/resetprop-rs" ] && cp "module/bin/${ABI}/resetprop-rs" "$staging/bin/${ABI}/"
            # aapt (如有预编译)
            [ -f "module/bin/${ABI}/aapt" ] && cp "module/bin/${ABI}/aapt" "$staging/bin/${ABI}/"

            # WebUI
            if [ -d module/webroot ]; then
              cp -r module/webroot "$staging/webroot"
            fi
            # banner
            [ -f module/banner.png ] && cp module/banner.png "$staging/banner.png"
            # LKM (如有预编译)
            if [ -d module/lkm ] && ls module/lkm/*.ko >/dev/null 2>&1; then
              mkdir -p "$staging/lkm"
              cp module/lkm/*.ko "$staging/lkm/"
            fi
            # emoji
            [ -d module/emoji ] && cp -r module/emoji "$staging/emoji"

            # META-INF
            mkdir -p "$staging/META-INF/com/google/android"
            cat > "$staging/META-INF/com/google/android/update-binary" << 'UPDATER'
          #!/sbin/sh

          OUTFD=/proc/self/fd/$2
          ZIPFILE="$3"

          ui_print() { echo -e "ui_print $1\nui_print" >> $OUTFD; }

          MODPATH="${MODPATH:-/data/adb/modules/meta-zeromount}"
          mkdir -p "$MODPATH"
          unzip -o "$ZIPFILE" -d "$MODPATH" >&2
          chmod 755 "$MODPATH"/*.sh "$MODPATH"/bin/*/zeromount "$MODPATH"/bin/*/resetprop-rs 2>/dev/null || true
          ui_print "ZeroMount installed via recovery"
          exit 0
          UPDATER
            echo "" > "$staging/META-INF/com/google/android/updater-script"

            rm -f "$out_path"
            (cd "$staging" && zip -r9 "$out_path" .)
            rm -rf "$staging"
            echo "    大小: $(du -h "$out_path" | cut -f1)"
            echo "    路径: $out_path"
          }

          if [ "${{ inputs.profile }}" = "release" ] || [ "${{ inputs.profile }}" = "both" ]; then
            build_zip "release"
            echo "release_zip=release/release/zeromount-${VERSION}.zip" >> $GITHUB_OUTPUT
          fi
          if [ "${{ inputs.profile }}" = "debug" ] || [ "${{ inputs.profile }}" = "both" ]; then
            build_zip "debug"
            echo "debug_zip=release/debug/zeromount-${VERSION}-debug.zip" >> $GITHUB_OUTPUT
          fi

          echo "=== 打包结果 ==="
          find release -name "*.zip" -exec ls -la {} \;

      - name: 上传 Release zip 工件
        if: inputs.profile == 'release' || inputs.profile == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: zeromount-release-zip
          path: release/release/zeromount-*.zip
          retention-days: 30

      - name: 上传 Debug zip 工件
        if: inputs.profile == 'debug' || inputs.profile == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: zeromount-debug-zip
          path: release/debug/zeromount-*.zip
          retention-days: 30

      - name: 创建发布
        if: inputs.create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          TAG="zeromount-module-${TIME}"
          VERSION="${{ steps.ver.outputs.version }}"
          ZIPS=""
          if [ "${{ inputs.profile }}" = "release" ] || [ "${{ inputs.profile }}" = "both" ]; then
            ZIPS="release/release/zeromount-*.zip"
          fi
          if [ "${{ inputs.profile }}" = "debug" ] || [ "${{ inputs.profile }}" = "both" ]; then
            ZIPS="$ZIPS release/debug/zeromount-*.zip"
          fi

          cat << EOF > release_notes.md
          ### 📦 ZeroMount KSU 模块独立构建 (arm64 only)

          - 构建时间: $TIME_FORM
          - 模块版本: $VERSION
          - 来源: Enginex0/zeromount @ ${{ inputs.zm_ref }}
          - 架构: arm64-v8a (仅)
          - Profile: ${{ inputs.profile }}
          - WebUI: SolidJS + Vite (已编译内联)
          - Bootloop 修复: ${{ inputs.fix_bootloop }}

          ### ⚠️ 重要说明
          1. 本模块仅含 arm64-v8a 架构, 请确认设备架构匹配
          2. 需要内核已打 zeromount 内核补丁 (zeromount_patch/60_zeromount-android15-6.6.patch)
          3. 安装方法: 在 KSU 管理器中刷入 zip
          4. 已应用 bootloop 修复: 阈值调高 + 禁用强制重启 + 清理 bootcount 残留
          EOF

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "ZeroMount-module-$VERSION (arm64)" \
            --notes-file release_notes.md \
            $ZIPS
