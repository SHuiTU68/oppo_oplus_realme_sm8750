          #由于部分机型的vintf兼容性检测规则，在开启CONFIG_IP6_NF_NAT后开机会出现"您的设备内部出现了问题。请联系您的设备制造商了解详情。"的提示，故添加一个配置修复补丁，在编译内核时隐藏CONFIG_IP6_NF_NAT=y但不影响对应功能编译
          cd common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/config.patch
          patch -p1 -F 3 < config.patch || true

      - name: 添加 BBR 等一系列拥塞控制算法
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            echo "正在添加BBR等拥塞控制算法..."
            cd kernel_workspace
            # 应用 BBRv3 backport 补丁（来源：WildKernels/kernel_patches/common/bbrv3）
            # 注：BBRv3 是 Google Linux 内核 6.4+ 引入的新一代拥塞控制算法（BBR v1 的改进版），
            # 通过更精细的带宽探测与 ProbeRTT 优化、PROBE_BW 状态机分阶段处理、ECN 显式拥塞通知支持，
            # 显著提升了高 BDP 链路吞吐与公平性，并降低 RTT 不公平性。
            # WildKernels 已将其 backport 到 android15-6.6 并保持 Android KABI 合规，这里直接复用。
            # 注：WildKernels 的 sysctl_add_proc_dou8vec_minmax / sysctl_fix_data-races 两个配套补丁
            # 在 Linux 6.6 内核中已合入（proc_dou8vec_minmax 函数已存在且已含 READ_ONCE/WRITE_ONCE 修复），
            # 无需也无法重复应用，否则会导致 fuzz 匹配错误。仅应用 bbrv3_6.6.patch 主体补丁即可。
            echo ">>> 应用 BBRv3 backport 补丁..."
            cd common
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/bbrv3_patch/bbrv3_6.6.patch
            patch -p1 -F 3 < bbrv3_6.6.patch || true
            cd ..
            #开启TCP拥塞控制算法控制器（必需）
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig
            ################################################################################################################################
            # BBR：基于链路容量的代表拥塞控制算法，不再使用丢包、延时等信号去衡量拥塞是否发生，而是直接对网络建模来应对、避免真实的网络拥塞；
            # 具有高吞吐、低延迟、抗丢包的特点，但在手机上使用时由于持续探测带宽/RTT、高频计算与发包增加 CPU 和射频模块功耗，会增加耗电及发热；
            # 且移动基站缓冲区深度通常较小（~50ms），BBR 的带宽探测阶段（ProbeRTT）过度降窗可能导致吞吐量骤降，且网络切换（WiFi→5G）时需重新
            # 探测参数，反而增加延迟或导致速率振荡（短暂卡顿），且存在 RTT 不公平性，与基于丢包的流竞争时可能过于强势，在混合网络环境中
            #（如 BBR + CUBIC 共存），BBR 会抢占更多其他软件的带宽，降低其他应用的公平性（如后台软件更新影响前台视频播放）。
            # 因此，虽然BBR可以显著减少排队延迟，抗丢包能力强，带宽利用率高，但由于其会增加耗电，且易导致网络速率波动，故安卓系统默认不使用
            # BBR拥塞算法，而是使用在吞吐量、稳定性、兼容性、能效之间取得最佳平衡的CUBIC算法。在开启BBR前，请考虑自己是否真的有使用BBR的必要。
            ################################################################################################################################
            echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
            #CUBIC：安卓的默认TCP拥塞控制算法，在吞吐量、稳定性、兼容性、能效之间取得最佳平衡，具有高兼容性与公平性、抗网络波动性强、低计算开销的特点，是绝大部分移动场景的优先选择
            echo "CONFIG_TCP_CONG_CUBIC=y" >> ./common/arch/arm64/configs/gki_defconfig
            #VEGAS：基于时延的拥塞控制算法之一，将回路响应时间（Round Trip Time，RTT）增加视为出现拥塞，增加时增大拥塞窗口，减小时减小拥塞窗口
            echo "CONFIG_TCP_CONG_VEGAS=y" >> ./common/arch/arm64/configs/gki_defconfig
            #New Vegas：Vegas 算法的改进版，优化了 RTT 测量和竞争公平性，可以更准确地检测拥塞，与 Reno/CUBIC 共存能力提升
            echo "CONFIG_TCP_CONG_NV=y" >> ./common/arch/arm64/configs/gki_defconfig
            #Westwood+：基于带宽估计（ACK 到达率）动态设置拥塞窗口和慢启动阈值；快速恢复，适合无线网络（区分拥塞丢包与无线丢包）
            echo "CONFIG_TCP_CONG_WESTWOOD=y" >> ./common/arch/arm64/configs/gki_defconfig
            #HTCP：一种基于损失的算法，使用 AIMD 来控制拥塞窗口，根据 RTT 动态调整增长因子，结合延迟和丢包信号，针对高延迟的高速网络进行优化
            echo "CONFIG_TCP_CONG_HTCP=y" >> ./common/arch/arm64/configs/gki_defconfig
            #brutal：一种通过主动探测 + 激进抢占最大化吞吐量的拥塞算法，无拥塞窗口上限，轻度丢包（<20%）不降窗，避免类似 BBR 的 ProbeRTT 阶段，
            #持续维持高发送速率，与 Reno/CUBIC 共存时，Brutal 可通过高频发包抢占 90%+ 带宽，适用于高丢包弱网环境（如公共 Wi-Fi、蜂窝网络）及
            #直播推流、云游戏上行链路等需优先保证吞吐量而非延迟敏感的场景，提升弱网吞吐性能，对抗运营商 QoS 限速。但由于TCP Brutal 仅在应用程序
            #对每个 TCP 连接设置带宽参数之后才能正常工作，绝大部分安卓应用都不支持该操作，故请勿将 TCP Brutal 设置成默认拥塞控制算法。
            echo "CONFIG_TCP_CONG_BRUTAL=y" >> ./common/arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "正在将BBR设为默认拥塞控制算法..."
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: 启用 Droidspaces 容器支持
        run: |
          if [[ "${{ github.event.inputs.droidspaces_enable }}" != "false" ]]; then
            echo "正在启用 Droidspaces 容器支持..."
            cd kernel_workspace/common
            # 应用 Droidspaces 容器必须补丁
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/fix_sysvipc_kabi_6_7_8.patch
            patch -p1 -F 3 < fix_sysvipc_kabi_6_7_8.patch || true
            # 修补 oplus_bsp_midas 行为，避免开机崩溃
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/fix_oplus_bsp_midas.patch
            patch -p1 -F 3 < fix_oplus_bsp_midas.patch || true
            # 应用 NTSync 补丁
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/ntsync_base.patch
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch
            patch -p1 -F 3 < ntsync_base.patch || true
            patch -p1 -F 3 < ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            # 开启 Droidspaces 容器所需内核支持
            echo "CONFIG_PID_NS=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_IPC_NS=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_SYSVIPC=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_DEVTMPFS=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_NAMESPACES=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_POSIX_MQUEUE=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_TARGET_LOG=y" >> ./arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_MATCH_RECENT=y" >> ./arch/arm64/configs/gki_defconfig
            # 未经测试的配置选项，可能导致bug
            #echo "CONFIG_CGROUP_DEVICE=y" >> ./arch/arm64/configs/gki_defconfig
            #echo "CONFIG_CGROUP_PIDS=y" >> ./arch/arm64/configs/gki_defconfig
            #echo "CONFIG_FW_LOADER_COMPRESS=y" >> ./arch/arm64/configs/gki_defconfig
            #echo "CONFIG_BRIDGE_NETFILTER=y" >> ./arch/arm64/configs/gki_defconfig
            #echo "CONFIG_NF_TABLES=y" >> ./arch/arm64/configs/gki_defconfig
            # 开启 NTSync
            echo "CONFIG_NTSYNC=y" >> ./arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.droidspaces_enable }}" == "extend" ]]; then
              echo "正在启用容器环境扩展支持..."
              # 开启虚拟 HCI 设备支持
              echo "CONFIG_BT_HCIVHCI=y" >> ./arch/arm64/configs/gki_defconfig
              # 开启 systemd-coredump 支持
              echo "CONFIG_STATIC_USERMODEHELPER=n" >> ./arch/arm64/configs/gki_defconfig
              # 添加 Lindroid EVDI DRM 驱动
              wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/evdi_drm.patch
              patch -p1 -F 3 < evdi_drm.patch || true
              echo "CONFIG_DRM_LINDROID_EVDI=y" >> ./arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: 启用ADIOS IO调度器
        if: inputs.adios_enable
        run: |
          echo "正在启用ADIOS IO调度器(将截止时间优先调度算法与基于自主学习的自适应延迟控制算法相结合, 降低I/O延迟)…"
          cd kernel_workspace
          echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用Re-Kernel支持
        if: inputs.rekernel_enable
        run: |
          echo "正在启用Re-Kernel支持(用于与Freezer,NoActive等软件配合使用,提升冻结后台能力)…"
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用内核级基带保护
        if: inputs.baseband_guard
        run: |
          echo "正在启用启用内核级基带保护支持…"
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: 启用NoMount挂载模块支持
        if: inputs.nomount_enable
        run: |
          echo "正在启用NoMount挂载模块支持(免挂载的路径重定向与虚拟文件注入)…"
          cd kernel_workspace/common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/nomount.c -O ./fs/nomount.c
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/nomount.h -O ./fs/nomount.h
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/nomount_6.6_kernel_integration.patch
          patch -p1 -F 3 < nomount_6.6_kernel_integration.patch || true
          echo "CONFIG_NOMOUNT=y" >> ./arch/arm64/configs/gki_defconfig

      - name: 启用上游安全补丁
        if: inputs.upstream_security_enable
        run: |
          echo "正在启用上游安全补丁(ACK android15-6.6-lts backport + linux-stable 6.6.140/6.6.144)..."
          cd kernel_workspace/common
          # ============================================================
          # 第一部分: rtmutex GhostLock CVE 修复 (linux-stable 6.6.140/6.6.144)
          # ============================================================
          # rtmutex GhostLock CVE-2026-43499: 修复优先级继承链 remove_waiter() 中的悬空指针 UAF
          # 漏洞源于 2.6.39 的 rtmutex 重构,影响所有启用 CONFIG_FUTEX_PI 的内核
          # Google kernelCTF 为此支付 $92,337 奖金,本地提权 + 容器逃逸
          echo ">>> [1/8] rtmutex GhostLock CVE-2026-43499..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/rtmutex_ghostlock_cve-2026-43499.patch
          patch -p1 --forward -F 3 < rtmutex_ghostlock_cve-2026-43499.patch || echo "::warning::CVE-2026-43499 patch 应用失败,可能已合入"
          # rtmutex CVE-2026-53163: 上述修复的后续, syzbot 报告的 NULL-ptr-deref
          # 必须在 CVE-2026-43499 之后应用,依赖其引入的 waiter_task 变量
          # 注: rtmutex_api.c 的 __rt_mutex_start_proxy_lock 签名在 6.6.89 与 ACK 6.6.114 不同,
          # 需 -F 3 模糊匹配上下文,核心修改(if (unlikely(ret)) -> if (unlikely(ret < 0)))不受影响
          echo ">>> [2/8] rtmutex CVE-2026-53163 (后续修复)..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/rtmutex_cve-2026-53163.patch
          patch -p1 --forward -F 3 < rtmutex_cve-2026-53163.patch || echo "::warning::CVE-2026-53163 patch 应用失败,可能已合入"
          # ============================================================
          # 第二部分: ACK android15-6.6-lts backport 补丁集 (6.6.89 -> 6.6.114 缺失补丁)
          # 来源: aosp-mirror/kernel_common android15-6.6-lts 分支
          # 全部为纯上游 UPSTREAM/BACKPORT, 不含 vendor hook / ABI 变更
          # 注: dma-buf sysfs 异步化/tls strp abort/net ip_output RCU/cpuidle menu revert
          #     四个补丁经实测已在 6.6.89 OPPD 内核中合入,此处不再重复应用
          # ============================================================
          # UFS: 部分 Kioxia UFS 4 设备不支持 qTimestamp 属性, 添加 quirk 跳过避免错误日志
          # 对应用户描述: "修复UFS高速闪存一处底层逻辑错误,提升文件读写稳定性"
          echo ">>> [3/8] UFS no timestamp quirk..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/ufs_no_timestamp_quirk.patch
          patch -p1 --forward -F 3 < ufs_no_timestamp_quirk.patch || echo "::warning::UFS timestamp quirk patch 应用失败,可能已合入或上下文不匹配"
          # mm/oom_kill: OOM reaper 反向遍历 VMA maple tree, 减少 page table lock 竞争
          # 对应用户描述: "优化进程退出后内存回收机制,提升高负载下应用退出后内存回收及时性"
          echo ">>> [4/8] mm/oom_kill OOM reaper 反向遍历..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/mm_oom_reap_reverse.patch
          patch -p1 --forward -F 3 < mm_oom_reap_reverse.patch || echo "::warning::mm/oom_kill reap reverse patch 应用失败,可能已合入或上下文不匹配"
          # mm/oom_kill: 引入 thaw_process() 解冻整个 OOM victim 进程(而非单线程)
          # 确保 OOM victim 能自行终止, 修复 frozen 状态下无法退出的问题
          echo ">>> [5/8] mm/oom_kill thaw 整个 OOM victim..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/mm_oom_thaw_process.patch
          patch -p1 --forward -F 3 < mm_oom_thaw_process.patch || echo "::warning::mm/oom_kill thaw process patch 应用失败,可能已合入或上下文不匹配"
          # mm/list_lru: cgroup.memory=nokmem 时禁用 memcg_aware, 减少不必要的 memcg 操作
          echo ">>> [6/8] mm/list_lru nokmem 禁用 memcg_aware..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/mm_list_lru_nokmem.patch
          patch -p1 --forward -F 3 < mm_list_lru_nokmem.patch || echo "::warning::mm/list_lru nokmem patch 应用失败,可能已合入或上下文不匹配"
          # bpf: 修复 helper 写入只读 map(.rodata)的安全漏洞
          # 注: 该补丁为 ACK 6.6.114 设计, 6.6.89 的 filter.c 行号偏移导致 fuzz 改错位置
          # (Hunk #1 误改 bpf_xdp_check_mtu_proto 而非 bpf_skb_check_mtu_proto),
          # bpf.h 删除 ARG_PTR_TO_INT 定义后 bpf_skb_check_mtu_proto 编译报 undeclared identifier
          # 故移除该补丁, 待内核升级到 6.6.114+ 后再合入
          # crypto: af_alg_sendmsg 禁止并发写, 修复 socket 内部状态不一致
          echo ">>> [7/8] crypto af_alg 禁止并发写..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/crypto_af_alg_concurrent_write.patch
          patch -p1 --forward -F 3 < crypto_af_alg_concurrent_write.patch || echo "::warning::crypto af_alg concurrent write patch 应用失败,可能已合入或上下文不匹配"
          # arm64: uprobe 模拟 nop 指令, 避免返回用户态执行, 提升 uprobe/uretprobe 性能
          echo ">>> [8/8] arm64 uprobe nop 模拟..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/arm64_uprobe_nop_simulate.patch
          patch -p1 --forward -F 3 < arm64_uprobe_nop_simulate.patch || echo "::warning::arm64 uprobe nop simulate patch 应用失败,可能已合入或上下文不匹配"

      - name: 启用 zram 魔改优化
        if: inputs.zram_optimize_enable
        run: |
          echo "正在启用 zram 魔改优化(上游 fix backport + CONFIG 调优)..."
          cd kernel_workspace/common
          # ============================================================
          # 第一部分: 上游 zram fix backport (linux-stable 6.6.140/6.6.142)
          # 来源: gregkh/linux linux-6.6.y 分支
          # ============================================================
          # zram: fix use-after-free in zram_bvec_write_partial()
          # commit 732fd9f0b9c1cdc6dfd77162ded60df005182cc0 (linux-stable 6.6.142)
          # zram_read_page() 根据 bio 是否 NULL 选择 sync/async 路径, write_partial 误传父 bio
          # 导致 async 读未完成时 buffer 已被释放, 修复为传 NULL 走 sync 路径
          echo ">>> [1/2] zram fix write_partial UAF (6.6.142)..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/zram_fix_write_partial_uaf.patch
          patch -p1 --forward -F 3 < zram_fix_write_partial_uaf.patch || echo "::warning::zram write_partial UAF patch 应用失败,可能已合入或上下文不匹配"
          # zram: do not forget to endio for partial discard requests
          # commit e3668b371329ea036ff022ce8ecc82f8befcf003 (linux-stable 6.6.140)
          # partial discard 时直接 return 漏了 bio_endio, 导致 blkdiscard 永久阻塞
          echo ">>> [2/2] zram fix partial discard endio (6.6.140)..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch/zram_fix_discard_endio.patch
          patch -p1 --forward -F 3 < zram_fix_discard_endio.patch || echo "::warning::zram discard endio patch 应用失败,可能已合入或上下文不匹配"
          # ============================================================
          # 第二部分: CONFIG 调优 (追加到 gki_defconfig)
          # 6.6.89 OPPD 默认: ZRAM=m, ZRAM_DEF_COMP=lzo-rle, 无 WRITEBACK/MULTI_COMP
          # ============================================================
          echo ">>> 追加 zram CONFIG 调优到 gki_defconfig..."
          cat >> ./arch/arm64/configs/gki_defconfig << 'ZRAM_CFG_EOF'
          # zram 魔改优化 CONFIG (不干涉默认算法, 保持 OPPD 原始 lzo-rle)
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_ZRAM_TRACK_ENTRY_ACTIME=y
          CONFIG_ZRAM_MULTI_COMP=y
          # CONFIG_ZRAM_MEMORY_TRACKING is not set
          ZRAM_CFG_EOF
          echo "zram CONFIG 调优已追加 (WRITEBACK + MULTI_COMP + 关 MEMORY_TRACKING, 不改默认算法)"

      - name: 启用 zstdp 压缩算法
        if: inputs.zstdp_enable
        run: |
          echo "正在启用 zstdp 压缩算法 (单 patch: 包含 abk_zstdp/ 新增文件 + 4 个文件修改)..."
          cd kernel_workspace/common
          # 方案: 一个完整的 zstdp_full.patch, 包含:
          #   1) 新增 crypto/abk_zstdp/ 完整目录 (vendor v6.15 zstd 源码 + 所有兼容性修改已应用)
          #   2) 修改 crypto/Kconfig (source abk_zstdp/Kconfig)
          #   3) 修改 crypto/Makefile (obj-$(CONFIG_CRYPTO_ZSTDP) += abk_zstdp/)
          #   4) 修改 drivers/block/zram/Kconfig (DEF_COMP_ZSTDP choice + default)
          #   5) 修改 drivers/block/zram/zcomp.c (backends[] 数组追加 "zstdp")
          # 注: zram/Kconfig 的 depends 行不通过 patch 修改 (避免与 lz4kd 补丁冲突),
          #     改用 sed 确保 CRYPTO_ZSTDP 出现在 depends 行
          RAW_BASE="https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch"
          wget -O /tmp/zstdp_full.patch "$RAW_BASE/zstdp_full.patch"
          patch -p1 --forward -F 3 < /tmp/zstdp_full.patch || echo "::warning::zstdp_full.patch 可能已应用或上下文偏移 (fuzz=3 容错)"
          rm -f /tmp/zstdp_full.patch
          # sed 确保 zram/Kconfig 的 depends 行包含 CRYPTO_ZSTDP (兼容 lz4kd 等补丁修改过的 depends 行)
          ZRAM_KCONFIG=./drivers/block/zram/Kconfig
          if grep -q '^	depends on CRYPTO_LZO.*CRYPTO_ZSTD' "$ZRAM_KCONFIG" && ! grep -q 'CRYPTO_ZSTDP' "$ZRAM_KCONFIG"; then
            sed -i '/^	depends on CRYPTO_LZO.*CRYPTO_ZSTD/s/CRYPTO_ZSTD/CRYPTO_ZSTD || CRYPTO_ZSTDP/' "$ZRAM_KCONFIG"
            echo "已通过 sed 将 CRYPTO_ZSTDP 添加到 zram/Kconfig depends 行"
          fi
          echo ">>> 追加 CONFIG_CRYPTO_ZSTDP=m 到 gki_defconfig (编译成模块, 通过 KSU 模块加载)..."
          DEFCONFIG=./arch/arm64/configs/gki_defconfig
          cat >> "$DEFCONFIG" << 'ZSTDP_CFG_EOF'
          # zstdp 算法 CONFIG (编译成可加载模块, 不改默认算法)
          # 由于设备 zram.ko 来自 vendor 分区(CONFIG_ZRAM=m), boot 内核里的 zcomp.c backends 不生效;
          # 改为编译 zstdp.ko 模块, 通过 KSU 模块 post-fs-data.sh 开机 insmod, 使 crypto 子系统注册 zstdp 算法,
          # 然后用户可 echo zstdp > /sys/block/zram0/comp_algorithm 切换 (zcomp_available_show 兜底逻辑支持非 backends 算法)
          CONFIG_CRYPTO_ZSTDP=m
          ZSTDP_CFG_EOF
          echo "zstdp 集成完成 (单 patch 应用 + CONFIG 追加)"
          echo "验证集成结果:"
          grep -E 'CRYPTO_ZSTDP|ZRAM_DEF_COMP_ZSTDP|zstdp' crypto/Kconfig crypto/Makefile drivers/block/zram/Kconfig drivers/block/zram/zcomp.c 2>/dev/null | head -20

      - name: 添加制作名称
        run: |
          cd kernel_workspace
          echo "替换内核版本后缀..."
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            echo "当前内核版本后缀：${{ github.event.inputs.kernel_suffix }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ github.event.inputs.kernel_suffix }}\"|" "$f"
            done
            sudo sed -i 's/-4k/-${{ github.event.inputs.KERNEL_SUFFIX }}/g' ./common/arch/arm64/configs/gki_defconfig
          else
            echo "当前内核版本后缀：${{ env.KERNEL_NAME }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ env.KERNEL_NAME }}\"|" "$f"
            done
            sudo sed -i 's/-4k/-${{ env.KERNEL_NAME }}/g' ./common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig
           
      - name: 构建内核
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          echo "编译器信息:"
          echo "Clang版本: $CLANG_VERSION"
          echo "LLD版本: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"
          
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="3G"
          export CCACHE_IS_KERNEL_COMPILING="true"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          
          cd kernel_workspace/common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          #创建 CC (编译器) 包装器
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          #创建 LD (链接器) 包装器
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          
          # 测试时间劫持测试是否正常工作
          echo "--- [Wrapper Test] 正在创建通用的时间劫持测试脚本 ---"
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper 内部环境检查完毕."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh # 执行所有传入的参数
          chmod +x test-wrapper.sh
          echo "--- [Wrapper Test] 正在测试 (date) 命令 ---"
          ./test-wrapper.sh date
          echo "--- [Wrapper Test] 正在测试 (stat) 命令 ---"
          ./test-wrapper.sh stat ./Makefile
          echo "--- [Wrapper Test] 测试完毕 ---"
          chmod +x cc-wrapper ld-wrapper
          echo "--- 编译前环境时间: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- 编译前环境文件时间戳: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          
          #在构建内核的同时清除不必要的.NET, Android NDK, Haskell, CodeQL运行库，清理空间且不阻塞后续步骤运行
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image &&
          # 当 zstdp_enable=true 时编译 zstdp.ko 模块 (CONFIG_CRYPTO_ZSTDP=m)
          if [[ "${{ github.event.inputs.zstdp_enable }}" == "true" ]]; then
            echo ">>> 编译 zstdp.ko 模块 (zstdp_enable=true)..."
            make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error modules 2>&1 | tail -5
            # 验证 zstdp.ko 生成
            find out/ -name 'zstdp.ko' -exec ls -la {} \;
          fi
          
          # 编译后时间劫持二次校验
          echo "--- 编译后环境时间: $(LD_PRELOAD=$PRELOAD_LIBS date) ---"
          echo "--- 编译后环境文件时间戳: ---"
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "内核编译完成！"
          echo "ccache状态："
          ccache -s
          echo "编译后空间:"
          df -h

      - name: 保存新的 ccache 缓存
        if: inputs.ccache_update || steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }}
         
      - name: 应用KPM并修补内核
        if: inputs.kpm_enable
        run: |
          echo "正在应用KP-N并修补内核..."
          cd kernel_workspace/common/out/arch/arm64/boot
          wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kptools-linux
          wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kpimg-linux
          chmod +x ./kptools-linux
          ./kptools-linux -p -i ./Image -k ./kpimg-linux -o ./oImage
          rm -f Image
          mv oImage Image
          
      - name: 编译 nm 工具并打包 NoMount KSU 模块
        id: create_nomount_zip
        if: inputs.nomount_enable
        run: |
          echo "=== 编译 nm userspace 工具（aarch64 freestanding）==="
          cd kernel_workspace
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/nm.c -O ./nm.c
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/nm.h -O ./nm.h
          clang --target=aarch64-linux-gnu -static -nostdlib -O2 -ffreestanding -fno-stack-protector -fuse-ld=lld -o ./nm ./nm.c
          file ./nm
          ls -la ./nm

          echo "=== 拉取官方 NoMount 模块模板（含 WebUI）==="
          mkdir -p nomount_module/bin
          mkdir -p nomount_module/webroot/locales
          BASE_URL="https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/nomount_patch/module"
          for f in customize.sh metainstall.sh metamount.sh module.prop service.sh; do
            wget "$BASE_URL/$f" -O "nomount_module/$f"
          done
          for f in index.html index.js styles.css theme.css; do
            wget "$BASE_URL/webroot/$f" -O "nomount_module/webroot/$f"
          done
          for f in en.json es.json id.json ru.json tr.json zh.json; do
            wget "$BASE_URL/webroot/locales/$f" -O "nomount_module/webroot/locales/$f"
          done

          # 把编译好的 nm 二进制放到 bin/nm-arm64（官方 customize.sh 会自动 rename 为 nm）
          cp ./nm nomount_module/bin/nm-arm64
          chmod 755 nomount_module/bin/nm-arm64
          # 设置脚本文件权限
          chmod 755 nomount_module/customize.sh nomount_module/metainstall.sh nomount_module/metamount.sh nomount_module/service.sh

          echo "=== 打包 NoMount KSU 模块 zip ==="
          cd nomount_module
          NOMOUNT_ZIP_NAME="NoMount_v1.1.0_aarch64.zip"
          zip -r "../$NOMOUNT_ZIP_NAME" ./*
          cd ..
          ls -la "$NOMOUNT_ZIP_NAME"
          echo "nomount_zip_name=$NOMOUNT_ZIP_NAME" >> $GITHUB_OUTPUT

          # 清理编译中间产物
          rm -f ./nm.c ./nm.h ./nm

      - name: 克隆 AnyKernel3 并打包
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "未找到内核镜像文件，构建可能出错"
            exit 1
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "xxksu" ]]; then
            KSU_TYPENAME="XXKSU"
          else
            KSU_TYPENAME="none"
          fi
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            wget https://raw.githubusercontent.com/$GITHUB_REPOSITORY/refs/heads/$GITHUB_REF_NAME/zram.zip
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'true' ]]; then
            wget https://github.com/cctv18/KPatch-Next/releases/latest/download/kpn.zip
          fi
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ github.event.inputs.kernel_suffix }}
          else
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ env.KERNEL_NAME }}
          fi
          # 追加功能开关后缀，便于从 zip 名识别启用的特性（与本地 builder_6.6.89_mtk.sh 保持一致）
          if [[ "${{ github.event.inputs.lz4_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-lz4-zstd"
          fi
          if [[ "${{ github.event.inputs.kpm_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-kpm"
          fi
          if [[ "${{ github.event.inputs.bbr_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-bbrv3"
          elif [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
            AK3_NAME="${AK3_NAME}-bbrv3-default"
          fi
          if [[ "${{ github.event.inputs.droidspaces_enable }}" == "standard" ]]; then
            AK3_NAME="${AK3_NAME}-dss"
          elif [[ "${{ github.event.inputs.droidspaces_enable }}" == "extend" ]]; then
            AK3_NAME="${AK3_NAME}-dssextend"
          fi
          if [[ "${{ github.event.inputs.adios_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-adios"
          fi
          if [[ "${{ github.event.inputs.rekernel_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-rek"
          fi
          if [[ "${{ github.event.inputs.baseband_guard }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-bbg"
          fi
          if [[ "${{ github.event.inputs.nomount_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-nomount"
          fi
          if [[ "${{ github.event.inputs.upstream_security_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-usec"
          fi
          if [[ "${{ github.event.inputs.zram_optimize_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-zram"
          fi
          if [[ "${{ github.event.inputs.zstdp_enable }}" == "true" ]]; then
            AK3_NAME="${AK3_NAME}-zstdp"
          fi
          AK3_NAME="${AK3_NAME}.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT
          
          #为AK3添加注释（调试信息）
          CLEAN_SUB_VERSION="${{ env.SUB_VERSION }}"
          CLEAN_SUB_VERSION="${CLEAN_SUB_VERSION%_mtk}"
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ github.event.inputs.kernel_suffix }}
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ env.KERNEL_NAME }}
          fi
          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "susfs: ${{ github.event.inputs.susfs_enable }}" >> ./ak3.log
          echo "KPM: ${{ github.event.inputs.kpm_enable }}" >> ./ak3.log
          echo "LZ4: ${{ github.event.inputs.lz4_enable }}" >> ./ak3.log
          echo "LZ4KD: ${{ github.event.inputs.lz4kd_enable }}" >> ./ak3.log
          echo "IPset: ${{ github.event.inputs.better_net }}" >> ./ak3.log
          echo "BBR&Brutal(BBRv3): ${{ github.event.inputs.bbr_enable }}" >> ./ak3.log
          echo "Droidspaces: ${{ github.event.inputs.droidspaces_enable }}" >> ./ak3.log
          echo "ADIOS: ${{ github.event.inputs.adios_enable }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          echo "NoMount: ${{ github.event.inputs.nomount_enable }}" >> ./ak3.log
          echo "UpstreamSec: ${{ github.event.inputs.upstream_security_enable }}" >> ./ak3.log
          echo "ZramOpt: ${{ github.event.inputs.zram_optimize_enable }}" >> ./ak3.log
          echo "Zstdp: ${{ github.event.inputs.zstdp_enable }}" >> ./ak3.log
          zip -z ../$AK3_NAME < ./ak3.log

      - name: 打包 zstdp KSU 模块
        if: inputs.zstdp_enable
        id: create_zstdp_module
        run: |
          cd kernel_workspace
          ZSTDP_KO=./common/out/crypto/abk_zstdp/zstdp.ko
          if [[ ! -f "$ZSTDP_KO" ]]; then
            echo "::error::zstdp.ko 未找到, 模块编译失败"
            exit 1
          fi
          echo ">>> 找到 zstdp.ko:"
          ls -la "$ZSTDP_KO"
          echo ">>> 验证 zstdp.ko 符号:"
          llvm-nm-18 "$ZSTDP_KO" 2>/dev/null | grep -cE 'abk_zstdp_' | xargs -I{} echo "abk_zstdp_ 前缀符号数: {}"

          # 创建 KSU 模块目录结构
          ZSTDP_MOD_DIR=./zstdp_ksu_module
          rm -rf "$ZSTDP_MOD_DIR"
          mkdir -p "$ZSTDP_MOD_DIR/system/lib/modules"
          cp "$ZSTDP_KO" "$ZSTDP_MOD_DIR/system/lib/modules/zstdp.ko"

          # module.prop
          cat > "$ZSTDP_MOD_DIR/module.prop" << 'MODULE_PROP_EOF'
          id=zstdp_module
          name=zstdp + zstdn_o 算法加载器
          version=1.2.0
          versionCode=3
          author=SHuiTU68
          description=加载 zstdp.ko (vendor zstd level 12 + btopt + 关闭LDM + windowLog 18 + chainLog 18 + searchLog 2, 低功耗调优, 比 level 19+btultra2 省电 50-60% 压缩率仅降 5-10%, objcopy 符号隔离) 和 oplus_bsp_zstdn.ko (zstdn/zstdn_o 算法). 在 KSU 管理器点击 Action 可一键切换 zram 压缩算法, 或用 /data/adb/zstdp_switch.sh 命令行切换
          action=zstdp:切换到zstdp算法(低功耗);zstdn_o:切换到zstdn_o算法;default:切换回默认lzo-rle
          MODULE_PROP_EOF

          # post-fs-data.sh: 开机自动 insmod
          cat > "$ZSTDP_MOD_DIR/post-fs-data.sh" << 'POSTFS_EOF'
          #!/system/bin/sh
          LOG=/data/adb/zstdp_module.log
          echo "[$(date '+%H:%M:%S')] zstdp_module post-fs-data 启动" > "$LOG"

          # 等待 vendor 分区挂载完成 (最多 30 秒)
          i=0
          until [ -d /vendor/lib/modules ] || [ $i -ge 30 ]; do
            sleep 1; i=$((i+1))
          done
          [ ! -d /vendor/lib/modules ] && { echo "[$(date '+%H:%M:%S')] 错误: vendor 分区未挂载" >> "$LOG"; exit 1; }
          echo "[$(date '+%H:%M:%S')] vendor 分区已挂载" >> "$LOG"

          # 等待 zram 模块加载 (oplus zram.ko 通常在 init 阶段加载)
          i=0
          until cat /proc/modules 2>/dev/null | grep -q '^zram ' || [ $i -ge 30 ]; do
            sleep 1; i=$((i+1))
          done
          cat /proc/modules 2>/dev/null | grep '^zram ' >> "$LOG" 2>&1

          # 1. 加载 zstdp.ko (vendor zstd 变体, 注册 zstdp 算法)
          ZSTDP_KO=/data/adb/modules/zstdp_module/system/lib/modules/zstdp.ko
          if [ -f "$ZSTDP_KO" ]; then
            if ! cat /proc/modules 2>/dev/null | grep -q '^zstdp '; then
              # 先试 insmod, 失败则用 modprobe (modprobe 会自动处理依赖)
              if insmod "$ZSTDP_KO" 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] zstdp.ko 加载成功 (insmod)" >> "$LOG"
              elif modprobe zstdp 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] zstdp.ko 加载成功 (modprobe)" >> "$LOG"
              else
                echo "[$(date '+%H:%M:%S')] 错误: zstdp.ko 加载失败" >> "$LOG"
              fi
            else
              echo "[$(date '+%H:%M:%S')] zstdp 已加载, 跳过" >> "$LOG"
            fi
          else
            echo "[$(date '+%H:%M:%S')] 错误: $ZSTDP_KO 不存在" >> "$LOG"
          fi

          # 2. 加载 vendor 自带的 oplus_bsp_zstdn.ko (注册 zstdn/zstdn_o 算法)
          # 注意: oplus_bsp_zstdn.ko 可能依赖其他 oplus 模块, 用 modprobe 优先
          ZSTDN_KO=/vendor/lib/modules/oplus_bsp_zstdn.ko
          if [ -f "$ZSTDN_KO" ]; then
            if ! cat /proc/modules 2>/dev/null | grep -q '^oplus_bsp_zstdn '; then
              # modprobe 会读取 modules.dep 自动加载依赖
              if modprobe oplus_bsp_zstdn 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn.ko 加载成功 (modprobe)" >> "$LOG"
              elif insmod "$ZSTDN_KO" 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn.ko 加载成功 (insmod)" >> "$LOG"
              else
                echo "[$(date '+%H:%M:%S')] 错误: oplus_bsp_zstdn.ko 加载失败 (可能依赖未满足)" >> "$LOG"
              fi
            else
              echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn 已加载, 跳过" >> "$LOG"
            fi
          else
            echo "[$(date '+%H:%M:%S')] 错误: $ZSTDN_KO 不存在" >> "$LOG"
          fi

          # 3. 验证 crypto 注册结果
          sleep 2
          echo "[$(date '+%H:%M:%S')] === crypto 注册结果 ===" >> "$LOG"
          # busybox grep 不支持 \s, 用 [[:space:]] 替代
          cat /proc/crypto 2>/dev/null | grep -E 'name[[:space:]]+:[[:space:]]+(zstdp|zstdn|zstdn_o)$' >> "$LOG" 2>&1
          echo "[$(date '+%H:%M:%S')] === zram 可用算法 ===" >> "$LOG"
          cat /sys/block/zram0/comp_algorithm 2>/dev/null >> "$LOG" 2>&1
          echo "[$(date '+%H:%M:%S')] 完成" >> "$LOG"
          POSTFS_EOF
          chmod 755 "$ZSTDP_MOD_DIR/post-fs-data.sh"

          # 切换脚本: 支持运行时随时切换 zram 算法 (swapoff/reset/切换/重新 swapon)
          cat > "$ZSTDP_MOD_DIR/zstdp_switch.sh" << 'SWITCH_EOF'
          #!/system/bin/sh
          # 用法: zstdp_switch.sh <算法名>
          #   zstdp_switch.sh zstdp        切到 zstdp (vendor zstd 变体, preSplit 优化)
          #   zstdp_switch.sh zstdn_o      切到 zstdn_o (oplus zstdn 变体)
          #   zstdp_switch.sh lzo-rle      切回默认 lzo-rle
          #   zstdp_switch.sh              无参数 = 显示当前算法和可用列表
          ZRAM=/sys/block/zram0
          DEV=/dev/block/zram0
          LOG=/data/adb/zstdp_switch.log

          show_status() {
            echo "当前算法: $(cat $ZRAM/comp_algorithm)"
            echo "可用算法: $(cat $ZRAM/comp_algorithm | tr -d '[]')"
          }

          if [ -z "$1" ]; then
            show_status
            exit 0
          fi

          ALGO=$1
          echo "[$(date '+%H:%M:%S')] === 切换 zram 算法到 $ALGO ===" >> "$LOG"

          # 1. 保存当前 disksize (用于切换后重新初始化)
          OLD_DISKSIZE=$(cat $ZRAM/disksize 2>/dev/null)
          [ -z "$OLD_DISKSIZE" ] && OLD_DISKSIZE=11811160064
          echo "[$(date '+%H:%M:%S')] 原 disksize: $OLD_DISKSIZE" >> "$LOG"

          # 2. swapoff (解除 zram 使用, 否则 reset 会 busy)
          swapoff $DEV 2>>"$LOG"
          echo "[$(date '+%H:%M:%S')] swapoff 完成" >> "$LOG"

          # 3. reset (释放内存, 解除算法绑定)
          echo 1 > $ZRAM/reset 2>>"$LOG"
          if [ $? -ne 0 ]; then
            echo "[$(date '+%H:%M:%S')] 错误: reset 失败, 尝试重新 swapon 恢复" >> "$LOG"
            echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
            mkswap $DEV 2>>"$LOG"
            swapon $DEV 2>>"$LOG"
            echo "错误: reset 失败, 已恢复原状态"
            show_status
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] reset 完成" >> "$LOG"

          # 4. 切换算法
          echo "$ALGO" > $ZRAM/comp_algorithm 2>>"$LOG"
          if [ $? -ne 0 ]; then
            echo "[$(date '+%H:%M:%S')] 错误: 切换到 $ALGO 失败, 恢复原算法" >> "$LOG"
            show_status
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] 算法切换完成" >> "$LOG"

          # 5. 重新初始化 zram (恢复原 disksize)
          echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
          mkswap $DEV 2>>"$LOG"
          swapon $DEV 2>>"$LOG"
          echo "[$(date '+%H:%M:%S')] 重新 swapon 完成" >> "$LOG"

          # 6. 验证
          echo "[$(date '+%H:%M:%S')] === 切换结果 ===" >> "$LOG"
          show_status >> "$LOG" 2>&1
          show_status
          echo "[$(date '+%H:%M:%S')] 完成" >> "$LOG"
          SWITCH_EOF
          chmod 755 "$ZSTDP_MOD_DIR/zstdp_switch.sh"

          # service.sh: 把切换脚本复制到 /data/adb/ 便于全局调用
          cat > "$ZSTDP_MOD_DIR/service.sh" << 'SERVICE_EOF'
          #!/system/bin/sh
          # 复制切换脚本到 /data/adb/ 便于全局调用
          cp /data/adb/modules/zstdp_module/zstdp_switch.sh /data/adb/zstdp_switch.sh
          chmod 755 /data/adb/zstdp_switch.sh
          SERVICE_EOF
          chmod 755 "$ZSTDP_MOD_DIR/service.sh"

          # action.sh: KSU 管理器 Action 按钮 (KernelSU Next / SukiSU Ultra 支持)
          # $1 = action id (来自 module.prop 的 action= 字段)
          cat > "$ZSTDP_MOD_DIR/action.sh" << 'ACTION_EOF'
          #!/system/bin/sh
          SWITCH=/data/adb/zstdp_switch.sh
          # 如果切换脚本不存在, 从模块目录复制
          [ ! -f "$SWITCH" ] && cp /data/adb/modules/zstdp_module/zstdp_switch.sh "$SWITCH" 2>/dev/null && chmod 755 "$SWITCH"

          case "$1" in
            zstdp)
              echo ">>> 切换到 zstdp 算法 (vendor zstd level 9 高压缩)..."
              "$SWITCH" zstdp
              ;;
            zstdn_o)
              echo ">>> 切换到 zstdn_o 算法 (oplus zstdn)..."
              "$SWITCH" zstdn_o
              ;;
            default)
              echo ">>> 切换回默认 lzo-rle 算法..."
              "$SWITCH" lzo-rle
              ;;
            *)
              echo ">>> 当前 zram 算法状态:"
              "$SWITCH"
              ;;
          esac
          ACTION_EOF
          chmod 755 "$ZSTDP_MOD_DIR/action.sh"

          # 打包成 zip
          ZSTDP_ZIP_NAME=zstdp_module_$(TZ='Asia/Shanghai' date +'%Y%m%d_%H%M').zip
          cd "$ZSTDP_MOD_DIR"
          zip -r "../$ZSTDP_ZIP_NAME" ./*
          cd ..
          echo ">>> KSU 模块打包完成: $ZSTDP_ZIP_NAME"
          ls -la "$ZSTDP_ZIP_NAME"
          echo "zstdp_zip_name=$ZSTDP_ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 上传 Ccache 调试日志
        if: always() && inputs.ccache_debug
        uses: actions/upload-artifact@v7
        with:
          name: ccache-debug-log
          path: ${{ github.workspace }}/kernel_workspace/ccache.log
          archive: true

      - name: 上传 ZIP 工件
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip
          archive: false

      - name: 上传 NoMount 模块 zip 工件
        if: inputs.nomount_enable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.create_nomount_zip.outputs.nomount_zip_name }}
          path: ${{ github.workspace }}/kernel_workspace/NoMount*.zip
          archive: false

      - name: 上传 zstdp KSU 模块 zip 工件
        if: inputs.zstdp_enable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.create_zstdp_module.outputs.zstdp_zip_name }}
          path: ${{ github.workspace }}/kernel_workspace/zstdp_module*.zip
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
      
    steps:
      - name: 下载 ZIP 工件
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips
          skip-decompress: true

      - name: 下载 NoMount 模块 zip 工件
        if: inputs.nomount_enable
        uses: actions/download-artifact@v8
        with:
          name: NoMount_v1.1.0_aarch64.zip
          path: ./release_zips
          skip-decompress: true

      - name: 下载 zstdp KSU 模块 zip 工件
        if: inputs.zstdp_enable
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.zstdpzipname }}
          path: ./release_zips
          skip-decompress: true

      - name: 设置环境变量
        run: |
          CLEAN_SUB_VERSION="${{ env.SUB_VERSION }}"
          CLEAN_SUB_VERSION="${CLEAN_SUB_VERSION%_mtk}"
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ github.event.inputs.kernel_suffix }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${CLEAN_SUB_VERSION}-${{ env.KERNEL_NAME }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
            export FULL_VERSION=$FULL_VERSION
          fi
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          echo "TIME_FORM=$TIME_FORM" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "xxksu" ]]; then
            KSU_TYPENAME="XXKSU"
          else
            KSU_TYPENAME="无内置KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV
         
      - name: 创建发布
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > release_notes.md
          ### 📱 欧加真 ${{ env.KSU_TYPENAME }} MT6991 通用内核 | 构建信息
          - 内核版本号: ${{ env.FULL_VERSION }}
          - 编译时间: ${{ env.TIME_FORM }}
          - 机型：欧加真天玑9400+通用 ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }} 内核（基于一加Ace5 Ultra ${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }} 版官方OKI源码）
          - KSU分支：${{ env.KSU_TYPENAME }}
          - susfs支持：${{ github.event.inputs.susfs_enable }}
          - KPM支持 ：${{ github.event.inputs.kpm_enable }}
          - LZ4支持：${{ github.event.inputs.lz4_enable }}
          - LZ4KD支持：${{ github.event.inputs.lz4kd_enable }}
          - 网络功能增强：${{ github.event.inputs.better_net }}
          - BBRv3/Brutal 等拥塞控制算法支持：${{ github.event.inputs.bbr_enable }}
          - Droidspaces 容器支持：${{ github.event.inputs.droidspaces_enable }}
          - ADIOS IO调度器支持：${{ github.event.inputs.adios_enable }}
          - Re-Kernel支持：${{ github.event.inputs.rekernel_enable }}
          - 内核级基带保护支持：${{ github.event.inputs.baseband_guard }}
          - NoMount挂载模块支持：${{ github.event.inputs.nomount_enable }}
          - NoMount用户态工具：${{ github.event.inputs.nomount_enable == 'true' && '随本次发布一并打包（NoMount_v1.1.0_aarch64.zip），安装后在KSU管理器刷入' || '未启用' }}
          - 上游安全补丁(8项: rtmutex GhostLock CVE-2026-43499/53163修复优先级继承UAF; UFS timestamp quirk; mm/oom_kill反向遍历+thaw_process; mm/list_lru nokmem; crypto af_alg并发写; arm64 uprobe nop模拟; dma-buf sysfs异步化/tls strp abort/net ip_output RCU/cpuidle menu revert 四项已在6.6.89合入;bpf只读map修复因行号偏移已移除)：${{ github.event.inputs.upstream_security_enable }}
          - zram魔改优化(2项上游fix: write_partial UAF修复[6.6.142]+partial discard endio修复[6.6.140]; CONFIG调优: WRITEBACK冷页写回+MULTI_COMP多压缩流+关MEMORY_TRACKING省内存; 不干涉默认算法)：${{ github.event.inputs.zram_optimize_enable }}
          - zstdp压缩算法(vendor上游v6.15 zstd源码+objcopy符号前缀隔离避免与内核zstd冲突; zram专用preSplit优化压缩比优于zstd; 单个zstdp_full.patch一次性应用,含abk_zstdp新增目录+4文件修改; 只注册算法不干涉默认算法,运行时sysfs切换; 来源hubai7285-code/ABK dev分支)：${{ github.event.inputs.zstdp_enable }}
          - ReSukiSU管理器下载：[ReSukiSU_CI](https://github.com/cctv18/ReSukiSU_CI/releases)
          - SukiSU Ultra管理器下载：[SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
          - KernelSU Next管理器下载：[KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          - KSU原版管理器下载：[KernelSU](https://github.com/tiann/KernelSU/releases)
          - XXKSU管理器下载：[backslashxx/KernelSU](https://github.com/backslashxx/KernelSU/releases)
          
          ### ⏫️ 更新内容：
          - 更新${{ env.KSU_TYPENAME }}至最新版本（${{ needs.build.outputs.ksuver }}）
          - (预留)
          
          ### 📋 安装方法 | Installation Guide
          1. 若你的手机已经安装了第三方Recovery（如TWRP)，可下载对应机型的AnyKernel刷机包后进入Recovery模式，通过Recovery刷入刷机包后重启设备；
          2. 若你的手机之前已有 root 权限，可在手机上安装[HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher/releases)，在HorizonKernelFlasher中刷入AnyKernel刷机包并重启；
          3. 若你之前已刷入SukiSU Ultra内核，且SukiSU Ultra管理器已更新至最新版本，可在SukiSU Ultra管理器中直接刷入AnyKernel刷机包并重启；
          4. 刷入无lz4kd补丁版的内核前若刷入过lz4kd补丁版的内核，为避免出错，请先关闭zram模块；
          5. 由于KernelSU上游更新了元模块功能，最新版KSU管理器（包括除KernelSU Next以外的各分支）需要配合元模块(metamodule)才能正常挂载模块。目前的元模块包括[meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), [meta magicmount](https://github.com/7a72/meta-magic_mount/), [meta magicmount rs](https://github.com/Tools-cx-app/meta-magic_mount/), [hybrid mount](https://github.com/YuzakiKokuban/meta-hybrid_mount)等。若你是第一次使用KSU或刚从旧版KSU管理器升级至新版，请先安装一个元模块，这样其他涉及系统挂载的模块才能正常运行；
          6. KernelPatch Next（即KPN）是一个独立于KSU的KPM实现，可以运行在任意KSU/面具环境中（不适用于Apatch），且不能与(Re)SukiSU内置的kpm功能共同使用，使用前请保证你的内核没有内置的kpm实现/修补。
          
          #### ※※※刷写内核有风险，为防止出现意外导致手机变砖，在刷入内核前请务必用[KernelFlasher](https://github.com/capntrips/KernelFlasher)等软件备份boot等关键启动分区!※※※
          EOF

          RELEASE_FILES="release_zips/AnyKernel3_*.zip"
          if compgen -G "release_zips/NoMount_*.zip" > /dev/null; then
            RELEASE_FILES="$RELEASE_FILES release_zips/NoMount_*.zip"
          fi
          if compgen -G "release_zips/zstdp_module_*.zip" > /dev/null; then
            RELEASE_FILES="$RELEASE_FILES release_zips/zstdp_module_*.zip"
          fi
          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
