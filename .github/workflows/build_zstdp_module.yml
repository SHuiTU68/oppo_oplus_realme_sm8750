name: (独立) zstdp KSU 模块构建

env:
  TZ: Asia/Shanghai
  KERNEL_VERSION: '6.6'
  SUB_VERSION: '89_mtk'
  KERNEL_NAME: 'android15-8-g29d86c5fc9dd-abogki428889875-4k'

on:
  workflow_dispatch:
    inputs:
      kernel_suffix:
        description: '内核后缀(必须与主构建内核完全一致, 否则 zstdp.ko vermagic 不匹配无法 insmod; 留空默认 android15-8-g29d86c5fc9dd-abogki428889875-4k)'
        required: false
        type: string
        default: ''
      create_release:
        description: '是否创建 Release(关闭则仅上传 artifact 工件)'
        required: true
        type: boolean
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      zstdpzipname: ${{ steps.create_zstdp_module.outputs.zstdp_zip_name }}
    permissions:
      contents: write
    steps:
      - name: 安装环境依赖+初始化源码仓库及llvm-Clang18工具链
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "当前仓库：$GITHUB_REPOSITORY"
          echo "当前分支：$GITHUB_REF_NAME"

          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev &

          echo "正在克隆源码仓库..."
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/mt6991_v_15.0.2_ace5_ultra_6.6.89.zip -o common.zip &&
          unzip -q common.zip &&
          mv "android_kernel_oneplus_mt6991-oneplus-mt6991_v_15.0.2_ace5_ultra_6.6.89" common &&
          rm -rf common.zip &

          echo "正在克隆llvm-clang18工具链..." &&
          mkdir -p clang18 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
          unzip -q clang.zip -d clang18 &&
          rm -rf clang.zip &

          echo "正在克隆构建工具..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &

          wait
          echo "所有源码及llvm-Clang18工具链初始化完成！"
          echo "正在去除 ABI 保护 & 去除 dirty 后缀..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 应用 zstdp 补丁
        run: |
          echo "正在启用 zstdp 压缩算法 (单 patch: 包含 abk_zstdp/ 新增文件 + 4 个文件修改)..."
          cd kernel_workspace/common
          # 方案: 一个完整的 zstdp_full.patch, 包含:
          #   1) 新增 crypto/abk_zstdp/ 完整目录 (vendor v6.15 zstd 源码 + 所有兼容性修改已应用)
          #   2) 修改 crypto/Kconfig (source abk_zstdp/Kconfig)
          #   3) 修改 crypto/Makefile (obj-$(CONFIG_CRYPTO_ZSTDP) += abk_zstdp/)
          #   4) 修改 drivers/block/zram/Kconfig (DEF_COMP_ZSTDP choice + default)
          #   5) 修改 drivers/block/zram/zcomp.c (backends[] 数组追加 "zstdp")
          # 注: zram/Kconfig 的 depends 行不通过 patch 修改 (避免与 lz4kd 补丁冲突),
          #     改用 sed 确保 CRYPTO_ZSTDP 出现在 depends 行
          RAW_BASE="https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/upstream_patch"
          wget -O /tmp/zstdp_full.patch "$RAW_BASE/zstdp_full.patch"
          patch -p1 --forward -F 3 < /tmp/zstdp_full.patch || { echo "::error::zstdp_full.patch 应用失败"; exit 1; }
          rm -f /tmp/zstdp_full.patch
          # sed 确保 zram/Kconfig 的 depends 行包含 CRYPTO_ZSTDP (兼容 lz4kd 等补丁修改过的 depends 行)
          ZRAM_KCONFIG=./drivers/block/zram/Kconfig
          if grep -q '^	depends on CRYPTO_LZO.*CRYPTO_ZSTD' "$ZRAM_KCONFIG" && ! grep -q 'CRYPTO_ZSTDP' "$ZRAM_KCONFIG"; then
            sed -i '/^	depends on CRYPTO_LZO.*CRYPTO_ZSTD/s/CRYPTO_ZSTD/CRYPTO_ZSTD || CRYPTO_ZSTDP/' "$ZRAM_KCONFIG"
            echo "已通过 sed 将 CRYPTO_ZSTDP 添加到 zram/Kconfig depends 行"
          fi
          echo ">>> 追加 CONFIG_CRYPTO_ZSTDP=m 到 gki_defconfig (编译成模块, 通过 KSU 模块加载)..."
          DEFCONFIG=./arch/arm64/configs/gki_defconfig
          cat >> "$DEFCONFIG" << 'ZSTDP_CFG_EOF'
          # zstdp 算法 CONFIG (编译成可加载模块, 不改默认算法)
          # 由于设备 zram.ko 来自 vendor 分区(CONFIG_ZRAM=m), boot 内核里的 zcomp.c backends 不生效;
          # 改为编译 zstdp.ko 模块, 通过 KSU 模块 post-fs-data.sh 开机 insmod, 使 crypto 子系统注册 zstdp 算法,
          # 然后用户可 echo zstdp > /sys/block/zram0/comp_algorithm 切换 (zcomp_available_show 兜底逻辑支持非 backends 算法)
          CONFIG_CRYPTO_ZSTDP=m
          ZSTDP_CFG_EOF
          echo "zstdp 集成完成 (单 patch 应用 + CONFIG 追加)"
          echo "验证集成结果:"
          grep -E 'CRYPTO_ZSTDP|ZRAM_DEF_COMP_ZSTDP|zstdp' crypto/Kconfig crypto/Makefile drivers/block/zram/Kconfig drivers/block/zram/zcomp.c 2>/dev/null | head -20

      - name: 配置内核后缀 (vermagic 匹配主内核)
        run: |
          cd kernel_workspace
          echo "替换内核版本后缀 (必须与主构建一致, 否则 zstdp.ko vermagic 不匹配无法 insmod)..."
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            SUFFIX="${{ github.event.inputs.kernel_suffix }}"
            echo "当前内核版本后缀：$SUFFIX"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-$SUFFIX\"|" "$f"
            done
            sudo sed -i "s/-4k/-$SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          else
            SUFFIX="${{ env.KERNEL_NAME }}"
            echo "当前内核版本后缀：$SUFFIX (默认)"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-$SUFFIX\"|" "$f"
            done
            sudo sed -i "s/-4k/-$SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion
          echo "CONFIG_LOCALVERSION_AUTO=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo ">>> 验证后缀配置:"
          grep -E 'CONFIG_LOCALVERSION' ./common/arch/arm64/configs/gki_defconfig || true

      - name: 准备模块编译环境 + 编译 zstdp.ko
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          echo "编译器信息:"
          echo "Clang版本: $CLANG_VERSION"
          echo "LLD版本: $LLD_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"

          cd kernel_workspace/common

          # 清理不必要的运行库释放空间
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &

          # 注: zstdp.ko 引用 vfree/kmalloc/crypto_register_scomp 等内核导出符号,
          # modpost 阶段需要 vmlinux 的 Module.symvers 来解析这些符号.
          # modules_prepare 不生成 vmlinux/Module.symvers, 故无法单独用 M= 编译外部模块.
          # 方案: make modules 会自动先构建 vmlinux (生成 Module.symvers) 再编译所有 =m 模块,
          #       比完整 make Image 省 dtb/Image 打包时间, 仍能拿到 zstdp.ko.
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig

          echo ">>> 编译内核模块 (含 zstdp.ko, make modules 会自动先构建 vmlinux 生成 Module.symvers)..."
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error modules 2>&1 | tail -20

          # 验证 kernel.release (make modules 阶段已生成, 决定 vermagic, 必须与主内核一致)
          echo ">>> 验证 kernel.release (决定 vermagic, 必须与主内核一致):"
          cat out/include/config/kernel.release 2>/dev/null || echo "(kernel.release 未找到)"

          # 验证 zstdp.ko 生成 (make modules 输出在 out/crypto/abk_zstdp/)
          echo ">>> 验证 zstdp.ko 生成:"
          find out/ -name 'zstdp.ko' -exec ls -la {} \; 2>/dev/null
          ZSTDP_KO=$(find out/ -name 'zstdp.ko' 2>/dev/null | head -1)
          if [ -n "$ZSTDP_KO" ]; then
            echo ">>> 验证 zstdp.ko vermagic (需与主内核一致):"
            modinfo "$ZSTDP_KO" 2>/dev/null | grep -E 'vermagic|filename|name' || llvm-objdump-18 -s "$ZSTDP_KO" 2>/dev/null | grep -o 'vermagic=.*' | head -1
          else
            echo "::error::zstdp.ko 未找到, 模块编译失败"
            exit 1
          fi
          echo "zstdp.ko 编译完成！"
          echo "编译后空间:"
          df -h

      - name: 打包 zstdp KSU 模块
        id: create_zstdp_module
        run: |
          cd kernel_workspace
          ZSTDP_KO=./common/out/crypto/abk_zstdp/zstdp.ko
          if [[ ! -f "$ZSTDP_KO" ]]; then
            echo "::error::zstdp.ko 未找到, 模块编译失败"
            exit 1
          fi
          echo ">>> 找到 zstdp.ko:"
          ls -la "$ZSTDP_KO"
          echo ">>> 验证 zstdp.ko 符号:"
          llvm-nm-18 "$ZSTDP_KO" 2>/dev/null | grep -cE 'abk_zstdp_' | xargs -I{} echo "abk_zstdp_ 前缀符号数: {}"

          # 创建 KSU 模块目录结构
          ZSTDP_MOD_DIR=./zstdp_ksu_module
          rm -rf "$ZSTDP_MOD_DIR"
          mkdir -p "$ZSTDP_MOD_DIR/system/lib/modules"
          cp "$ZSTDP_KO" "$ZSTDP_MOD_DIR/system/lib/modules/zstdp.ko"

          # module.prop
          cat > "$ZSTDP_MOD_DIR/module.prop" << 'MODULE_PROP_EOF'
          id=zstdp_module
          name=zstd_p + zstdn_o 算法加载器
          version=1.4.2
          versionCode=7
          author=SHuiTU68
          description=加载 zstdp.ko (注册算法名 zstd_p; 极速配置 level 3 + fast 策略 + windowLog 12, 速度比 lzo-rle 更快, 压缩率仍优于 lzo, 流畅绝对优先) 和 oplus_bsp_zstdn.ko (zstdn/zstdn_o 算法). 点击 Action 进入菜单, 用音量键上下切换算法(音量上=上一个, 音量下=下一个), 电源键确认. 也可用 /data/adb/zstdp_switch.sh 命令行切换. service.sh 自动设置 max_comp_streams=4 提升并发压缩, 可选启用 zram writeback (冷数据写回闪存释放 zram 空间)
          action=menu:音量键选择算法(音量上/下切换,电源键确认);zstd_p:直接切到zstd_p;zstdn_o:直接切到zstdn_o;default:切回默认lzo-rle
          MODULE_PROP_EOF

          # post-fs-data.sh: 开机自动 insmod
          cat > "$ZSTDP_MOD_DIR/post-fs-data.sh" << 'POSTFS_EOF'
          #!/system/bin/sh
          LOG=/data/adb/zstdp_module.log
          echo "[$(date '+%H:%M:%S')] zstdp_module post-fs-data 启动" > "$LOG"

          # 等待 vendor 分区挂载完成 (最多 30 秒)
          i=0
          until [ -d /vendor/lib/modules ] || [ $i -ge 30 ]; do
            sleep 1; i=$((i+1))
          done
          [ ! -d /vendor/lib/modules ] && { echo "[$(date '+%H:%M:%S')] 错误: vendor 分区未挂载" >> "$LOG"; exit 1; }
          echo "[$(date '+%H:%M:%S')] vendor 分区已挂载" >> "$LOG"

          # 等待 zram 模块加载 (oplus zram.ko 通常在 init 阶段加载)
          i=0
          until cat /proc/modules 2>/dev/null | grep -q '^zram ' || [ $i -ge 30 ]; do
            sleep 1; i=$((i+1))
          done
          cat /proc/modules 2>/dev/null | grep '^zram ' >> "$LOG" 2>&1

          # 1. 加载 zstdp.ko (vendor zstd 变体, 注册 zstd_p 算法; 模块文件名仍为 zstdp.ko)
          ZSTDP_KO=/data/adb/modules/zstdp_module/system/lib/modules/zstdp.ko
          if [ -f "$ZSTDP_KO" ]; then
            if ! cat /proc/modules 2>/dev/null | grep -q '^zstdp '; then
              # 先试 insmod, 失败则用 modprobe (modprobe 会自动处理依赖)
              if insmod "$ZSTDP_KO" 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] zstdp.ko 加载成功 (insmod)" >> "$LOG"
              elif modprobe zstdp 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] zstdp.ko 加载成功 (modprobe)" >> "$LOG"
              else
                echo "[$(date '+%H:%M:%S')] 错误: zstdp.ko 加载失败" >> "$LOG"
              fi
            else
              echo "[$(date '+%H:%M:%S')] zstdp 已加载, 跳过" >> "$LOG"
            fi
          else
            echo "[$(date '+%H:%M:%S')] 错误: $ZSTDP_KO 不存在" >> "$LOG"
          fi

          # 2. 加载 vendor 自带的 oplus_bsp_zstdn.ko (注册 zstdn/zstdn_o 算法)
          # 注意: oplus_bsp_zstdn.ko 可能依赖其他 oplus 模块, 用 modprobe 优先
          ZSTDN_KO=/vendor/lib/modules/oplus_bsp_zstdn.ko
          if [ -f "$ZSTDN_KO" ]; then
            if ! cat /proc/modules 2>/dev/null | grep -q '^oplus_bsp_zstdn '; then
              # modprobe 会读取 modules.dep 自动加载依赖
              if modprobe oplus_bsp_zstdn 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn.ko 加载成功 (modprobe)" >> "$LOG"
              elif insmod "$ZSTDN_KO" 2>>"$LOG"; then
                echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn.ko 加载成功 (insmod)" >> "$LOG"
              else
                echo "[$(date '+%H:%M:%S')] 错误: oplus_bsp_zstdn.ko 加载失败 (可能依赖未满足)" >> "$LOG"
              fi
            else
              echo "[$(date '+%H:%M:%S')] oplus_bsp_zstdn 已加载, 跳过" >> "$LOG"
            fi
          else
            echo "[$(date '+%H:%M:%S')] 错误: $ZSTDN_KO 不存在" >> "$LOG"
          fi

          # 3. 验证 crypto 注册结果
          sleep 2
          echo "[$(date '+%H:%M:%S')] === crypto 注册结果 ===" >> "$LOG"
          # busybox grep 不支持 \s, 用 [[:space:]] 替代
          cat /proc/crypto 2>/dev/null | grep -E 'name[[:space:]]+:[[:space:]]+(zstd_p|zstdn|zstdn_o)$' >> "$LOG" 2>&1
          echo "[$(date '+%H:%M:%S')] === zram 可用算法 ===" >> "$LOG"
          cat /sys/block/zram0/comp_algorithm 2>/dev/null >> "$LOG" 2>&1
          echo "[$(date '+%H:%M:%S')] 完成" >> "$LOG"
          POSTFS_EOF
          chmod 755 "$ZSTDP_MOD_DIR/post-fs-data.sh"

          # 切换脚本: 支持运行时随时切换 zram 算法 (swapoff/reset/切换/重新 swapon)
          cat > "$ZSTDP_MOD_DIR/zstdp_switch.sh" << 'SWITCH_EOF'
          #!/system/bin/sh
          # 用法: zstdp_switch.sh <算法名>
          #   zstdp_switch.sh zstd_p       切到 zstd_p (vendor zstd 变体, 融合调优)
          #   zstdp_switch.sh zstdn_o      切到 zstdn_o (oplus zstdn 变体)
          #   zstdp_switch.sh lzo-rle      切回默认 lzo-rle
          #   zstdp_switch.sh              无参数 = 显示当前算法和可用列表
          ZRAM=/sys/block/zram0
          DEV=/dev/block/zram0
          LOG=/data/adb/zstdp_switch.log

          show_status() {
            echo "当前算法: $(cat $ZRAM/comp_algorithm)"
            echo "可用算法: $(cat $ZRAM/comp_algorithm | tr -d '[]')"
          }

          if [ -z "$1" ]; then
            show_status
            exit 0
          fi

          ALGO=$1
          echo "[$(date '+%H:%M:%S')] === 切换 zram 算法到 $ALGO ===" >> "$LOG"

          # 1. 保存当前 disksize (用于切换后重新初始化)
          OLD_DISKSIZE=$(cat $ZRAM/disksize 2>/dev/null)
          [ -z "$OLD_DISKSIZE" ] && OLD_DISKSIZE=11811160064
          echo "[$(date '+%H:%M:%S')] 原 disksize: $OLD_DISKSIZE" >> "$LOG"

          # 2. swapoff (解除 zram 使用, 否则 reset 会 busy)
          swapoff $DEV 2>>"$LOG"
          echo "[$(date '+%H:%M:%S')] swapoff 完成" >> "$LOG"

          # 3. reset (释放内存, 解除算法绑定)
          echo 1 > $ZRAM/reset 2>>"$LOG"
          if [ $? -ne 0 ]; then
            echo "[$(date '+%H:%M:%S')] 错误: reset 失败, 尝试重新 swapon 恢复" >> "$LOG"
            echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
            mkswap $DEV 2>>"$LOG"
            swapon $DEV 2>>"$LOG"
            echo "错误: reset 失败, 已恢复原状态"
            show_status
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] reset 完成" >> "$LOG"

          # 4. 切换算法
          echo "$ALGO" > $ZRAM/comp_algorithm 2>>"$LOG"
          if [ $? -ne 0 ]; then
            echo "[$(date '+%H:%M:%S')] 错误: 切换到 $ALGO 失败, 恢复原算法" >> "$LOG"
            show_status
            exit 1
          fi
          echo "[$(date '+%H:%M:%S')] 算法切换完成" >> "$LOG"

          # 5. 重新初始化 zram (恢复原 disksize)
          echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
          mkswap $DEV 2>>"$LOG"
          swapon $DEV 2>>"$LOG"
          echo "[$(date '+%H:%M:%S')] 重新 swapon 完成" >> "$LOG"

          # 6. 验证
          echo "[$(date '+%H:%M:%S')] === 切换结果 ===" >> "$LOG"
          show_status >> "$LOG" 2>&1
          show_status
          echo "[$(date '+%H:%M:%S')] 完成" >> "$LOG"
          SWITCH_EOF
          chmod 755 "$ZSTDP_MOD_DIR/zstdp_switch.sh"

          # service.sh: 设置 max_comp_streams + 可选 writeback + 复制切换脚本
          cat > "$ZSTDP_MOD_DIR/service.sh" << 'SERVICE_EOF'
          #!/system/bin/sh
          # zstdp 模块 service.sh - 运行时优化 + 备用脚本复制
          # 特性 9: max_comp_streams (多线程并发压缩, 减少 kswapd 抢占应用 CPU)
          # 特性 7: zram writeback (冷数据写回闪存, 释放 zram 空间, 减少 zram 解压压力)

          MOD=/data/adb/modules/zstdp_module
          ZRAM=/sys/block/zram0

          # 1. 复制切换脚本到 /data/adb/ 便于命令行调用 (action.sh 已内联逻辑, 此为备用)
          cp "$MOD/zstdp_switch.sh" /data/adb/zstdp_switch.sh
          chmod 755 /data/adb/zstdp_switch.sh

          # 2. 特性 9: 设置 max_comp_streams (sm8750 8 核, 设 4 线程并发压缩)
          #    多线程压缩让 kswapd 不阻塞应用核心, 打开应用更流畅
          if [ -w "$ZRAM/max_comp_streams" ]; then
            NPROC=$(nproc 2>/dev/null)
            [ -z "$NPROC" ] && NPROC=8
            STREAMS=$(( NPROC / 2 ))
            [ "$STREAMS" -lt 2 ] && STREAMS=2
            echo "$STREAMS" > "$ZRAM/max_comp_streams" 2>/dev/null
            echo "[zstdp] max_comp_streams = $STREAMS (nproc=$NPROC)"
          fi

          # 3. 特性 7: 可选启用 zram writeback (冷数据写回闪存)
          #    需要 CONFIG_ZRAM_WRITEBACK=y (内核支持) + backing block device
          #    手机无专门 swap 分区, 用 /data 下的文件 + loop device 模拟
          #    默认不启用 (设 ENABLE_WRITEBACK=1 启用, 需要确认内核支持)
          ENABLE_WRITEBACK=0
          WRITEBACK_FILE=/data/local/tmp/zram_writeback.bin
          WRITEBACK_SIZE_MB=512

          if [ "$ENABLE_WRITEBACK" = "1" ] && [ -w "$ZRAM/writeback" ]; then
            # 创建 backing 文件
            if [ ! -f "$WRITEBACK_FILE" ]; then
              dd if=/dev/zero of="$WRITEBACK_FILE" bs=1M count="$WRITEBACK_SIZE_MB" 2>/dev/null
            fi
            # 用 loop device 包装文件为 block device
            LOOP_DEV=$(losetup -f 2>/dev/null)
            if [ -n "$LOOP_DEV" ]; then
              losetup "$LOOP_DEV" "$WRITEBACK_FILE" 2>/dev/null
              echo "$LOOP_DEV" > "$ZRAM/backing_dev" 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "[zstdp] writeback 已启用: backing=$LOOP_DEV ($WRITEBACK_SIZE_MB MB)"
                # 标记闲置超过 1 小时的页写回 (idle=3600s)
                echo 3600 > "$ZRAM/idle" 2>/dev/null
              else
                echo "[zstdp] writeback 启用失败 (backing_dev 写入失败), 跳过"
                losetup -d "$LOOP_DEV" 2>/dev/null
              fi
            else
              echo "[zstdp] writeback 跳过 (无可用 loop device)"
            fi
          fi
          SERVICE_EOF
          chmod 755 "$ZSTDP_MOD_DIR/service.sh"

          # action.sh: KSU 管理器 Action 按钮 (KernelSU Next / SukiSU Ultra 支持)
          # $1 = action id (来自 module.prop 的 action= 字段)
          # 内联切换逻辑, 不再依赖 zstdp_switch.sh
          # menu 动作: 进入菜单, 用 getevent 监听音量键(上=上一个, 下=下一个) + 电源键确认
          cat > "$ZSTDP_MOD_DIR/action.sh" << 'ACTION_EOF'
          #!/system/bin/sh
          # zstdp 模块 action.sh - 内联切换逻辑 + 音量键菜单导航
          # 用法: action.sh <action_id>
          #   action.sh menu       进入音量键菜单
          #   action.sh zstd_p     直接切到 zstd_p
          #   action.sh zstdn_o    直接切到 zstdn_o
          #   action.sh default    切回默认 lzo-rle
          #   action.sh            无参数 = 显示当前状态

          ZRAM=/sys/block/zram0
          DEV=/dev/block/zram0
          LOG=/data/adb/zstdp_switch.log
          MOD_DIR=/data/adb/modules/zstdp_module

          # 算法列表 (循环切换: lzo-rle -> zstd_p -> zstdn_o -> lzo-rle)
          ALGOS="lzo-rle zstd_p zstdn_o"
          ALGO_COUNT=3

          show_status() {
            echo ">>> 当前 zram 算法: $(cat $ZRAM/comp_algorithm 2>/dev/null)"
            echo ">>> 可用算法: $(cat $ZRAM/comp_algorithm 2>/dev/null | tr -d '[]')"
          }

          # 切换算法核心逻辑 (内联, 不调用外部脚本)
          # $1 = 目标算法名
          switch_algo() {
            local ALGO=$1
            echo "[$(date '+%H:%M:%S')] === 切换 zram 算法到 $ALGO ===" >> "$LOG"

            # 0. 保存当前 disksize (用于切换后重新初始化)
            local OLD_DISKSIZE=$(cat $ZRAM/disksize 2>/dev/null)
            [ -z "$OLD_DISKSIZE" ] && OLD_DISKSIZE=11811160064
            echo "[$(date '+%H:%M:%S')] 原 disksize: $OLD_DISKSIZE" >> "$LOG"

            # 1. swapoff (解除 zram 使用, 否则 reset 会 busy)
            swapoff $DEV 2>>"$LOG"
            echo "[$(date '+%H:%M:%S')] swapoff 完成" >> "$LOG"

            # 2. reset (释放内存, 解除算法绑定)
            echo 1 > $ZRAM/reset 2>>"$LOG"
            if [ $? -ne 0 ]; then
              echo "[$(date '+%H:%M:%S')] 错误: reset 失败, 尝试重新 swapon 恢复" >> "$LOG"
              echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
              mkswap $DEV 2>>"$LOG"
              swapon $DEV 2>>"$LOG"
              echo ">>> 错误: reset 失败, 已恢复原状态"
              show_status
              return 1
            fi
            echo "[$(date '+%H:%M:%S')] reset 完成" >> "$LOG"

            # 3. 切换算法
            echo "$ALGO" > $ZRAM/comp_algorithm 2>>"$LOG"
            if [ $? -ne 0 ]; then
              echo "[$(date '+%H:%M:%S')] 错误: 切换到 $ALGO 失败" >> "$LOG"
              show_status
              return 1
            fi
            echo "[$(date '+%H:%M:%S')] 算法切换完成" >> "$LOG"

            # 4. 重新初始化 zram (恢复原 disksize)
            echo $OLD_DISKSIZE > $ZRAM/disksize 2>>"$LOG"
            mkswap $DEV 2>>"$LOG"
            swapon $DEV 2>>"$LOG"
            echo "[$(date '+%H:%M:%S')] 重新 swapon 完成" >> "$LOG"

            echo "[$(date '+%H:%M:%S')] === 切换结果 ===" >> "$LOG"
            show_status >> "$LOG" 2>&1
            echo ">>> 切换完成"
            show_status
            echo "[$(date '+%H:%M:%S')] 完成" >> "$LOG"
            return 0
          }

          # 获取当前算法在列表中的索引 (0-based)
          get_current_index() {
            local CUR=$(cat $ZRAM/comp_algorithm 2>/dev/null | tr -d '[]' | awk '{print $NF}')
            local i=0
            for a in $ALGOS; do
              if [ "$a" = "$CUR" ]; then echo $i; return; fi
              i=$((i+1))
            done
            # 未找到默认 0
            echo 0
          }

          # 按索引获取算法名
          get_algo_by_index() {
            local idx=$1
            local i=0
            for a in $ALGOS; do
              if [ $i -eq $idx ]; then echo "$a"; return; fi
              i=$((i+1))
            done
            echo "lzo-rle"
          }

          # 音量键菜单: 用 getevent 监听按键
          # 音量上 = 上一个算法, 音量下 = 下一个算法, 电源键 = 确认切换
          # 用临时文件传递状态, 避免 while read 管道子 shell 变量丢失
          menu_select() {
            local CUR_IDX=$(get_current_index)
            local SEL_IDX=$CUR_IDX

            echo "=========================================="
            echo "  zram 算法切换菜单"
            echo "=========================================="
            echo "  可选算法: $ALGOS"
            echo "  当前算法: $(get_algo_by_index $CUR_IDX)"
            echo "------------------------------------------"
            echo "  音量上 = 上一个"
            echo "  音量下 = 下一个"
            echo "  电源键 = 确认切换"
            echo "=========================================="
            echo ""
            echo ">>> 当前选择: [$(get_algo_by_index $SEL_IDX)]"
            echo ">>> 按音量键选择, 电源键确认..."

            # 临时文件: 存放最终选择的算法名
            local SEL_FILE=/tmp/zstdp_menu_selected_$$
            rm -f "$SEL_FILE"

            # 后台运行 getevent, 每行输出处理一次
            # 用 -q 安静模式减少噪音; getevent -l 输出字母名便于解析
            # 注意: getevent 在 KSU action 环境下需要 root, KSU action 默认 root
            # break 退出 while 后, 管道左侧 getevent 会因 SIGPIPE 退出, 无需手动 kill
            getevent -l -q 2>/dev/null | while IFS= read -r line; do
              # 只处理按键按下事件 (getevent -l 输出: /dev/input/eventX EV_KEY KEY_VOLUMEUP DOWN)
              case "$line" in
                *"KEY_VOLUMEUP"*"DOWN"*)
                  SEL_IDX=$(( (SEL_IDX - 1 + ALGO_COUNT) % ALGO_COUNT ))
                  echo ">>> 音量上 -> 选择: [$(get_algo_by_index $SEL_IDX)]"
                  ;;
                *"KEY_VOLUMEDOWN"*"DOWN"*)
                  SEL_IDX=$(( (SEL_IDX + 1) % ALGO_COUNT ))
                  echo ">>> 音量下 -> 选择: [$(get_algo_by_index $SEL_IDX)]"
                  ;;
                *"KEY_POWER"*"DOWN"*)
                  # 写入选择到文件, 然后 break 退出循环 (getevent 因管道关闭自动退出)
                  get_algo_by_index $SEL_IDX > "$SEL_FILE"
                  echo ">>> 电源键 -> 确认切换到: [$(cat "$SEL_FILE")]"
                  break
                  ;;
              esac
            done

            # 兜底: 确保残留 getevent 进程被清理 (理论上 SIGPIPE 已处理)
            pkill -f "getevent -l -q" 2>/dev/null

            # 读取选择结果
            local SEL_ALGO=""
            [ -f "$SEL_FILE" ] && SEL_ALGO=$(cat "$SEL_FILE")
            rm -f "$SEL_FILE"

            if [ -z "$SEL_ALGO" ]; then
              echo ">>> 未选择 (菜单被中断或超时), 退出"
              return 1
            fi
            echo ">>> 开始切换到: [$SEL_ALGO]"
            switch_algo "$SEL_ALGO"
          }

          case "$1" in
            menu)
              echo ">>> 进入音量键选择菜单..."
              menu_select
              ;;
            zstd_p)
              echo ">>> 直接切换到 zstd_p 算法 (vendor zstd 融合调优 level 19 + btultra2)..."
              switch_algo zstd_p
              ;;
            zstdn_o)
              echo ">>> 直接切换到 zstdn_o 算法 (oplus zstdn)..."
              switch_algo zstdn_o
              ;;
            default)
              echo ">>> 切换回默认 lzo-rle 算法..."
              switch_algo lzo-rle
              ;;
            *)
              echo ">>> zstdp 模块 action"
              echo ">>> 用法: action.sh <menu|zstd_p|zstdn_o|default>"
              echo ""
              show_status
              ;;
          esac
          ACTION_EOF
          chmod 755 "$ZSTDP_MOD_DIR/action.sh"

          # 打包成 zip
          ZSTDP_ZIP_NAME=zstdp_module_$(TZ='Asia/Shanghai' date +'%Y%m%d_%H%M').zip
          cd "$ZSTDP_MOD_DIR"
          zip -r "../$ZSTDP_ZIP_NAME" ./*
          cd ..
          echo ">>> KSU 模块打包完成: $ZSTDP_ZIP_NAME"
          ls -la "$ZSTDP_ZIP_NAME"
          echo "zstdp_zip_name=$ZSTDP_ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 上传 zstdp KSU 模块 zip 工件
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.create_zstdp_module.outputs.zstdp_zip_name }}
          path: ${{ github.workspace }}/kernel_workspace/zstdp_module*.zip
          archive: false

      - name: 创建发布
        if: inputs.create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          TAG="zstdp-module-${TIME}"
          FULL_VERSION="${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION="${FULL_VERSION}-${{ github.event.inputs.kernel_suffix }}"
          else
            FULL_VERSION="${FULL_VERSION}-${{ env.KERNEL_NAME }}"
          fi

          cp kernel_workspace/zstdp_module_*.zip ./ 2>/dev/null || true

          cat << EOF > release_notes.md
          ### 📦 zstdp KSU 模块独立构建

          - 内核版本: $FULL_VERSION
          - 构建时间: $TIME_FORM
          - 模块: zstdp.ko (注册算法名 zstd_p; level 19 + btultra2 + windowLog 14 + RowMatchFinder + BlockSplitter + targetCBlockSize 4096 融合调优)
          - vermagic: 需与主内核一致 (相同源码 + 相同后缀 + clang18)

          ### ✨ 合并的特性
          1. **RowMatchFinder**: row-based 哈希, 压缩速度提升 5-15%
          2. **BlockSplitter**: 大 block 自动切分, 压缩率提升 2-5%
          3. **targetCBlockSize=4096**: 输出 block 接近 4KB, 降低解压内存峰值
          7. **zram writeback**: 冷数据写回闪存 (可选, service.sh 里 ENABLE_WRITEBACK=1 启用)
          9. **max_comp_streams**: service.sh 自动设 nproc/2 并发压缩线程

          ### ⚠️ 重要说明
          1. 本模块必须配合主构建工作流编译的内核使用, 内核后缀需完全一致 (否则 insmod 报 vermagic 不匹配)
          2. 安装方法: 在 KSU 管理器中刷入本 zip
          3. 切换算法: KSU 管理器 Action 按钮或 \`/data/adb/zstdp_switch.sh zstd_p\` (注意算法名是 zstd_p 带下划线)
          EOF

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "zstdp-module-$FULL_VERSION" \
            --notes-file release_notes.md \
            zstdp_module_*.zip
